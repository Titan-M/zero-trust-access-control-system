version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      ZTAC_ENV: production
      ZTAC_DATABASE_URL: sqlite:///./ztac.db
      ZTAC_SECRET_KEY: replace-with-a-long-random-secret
      ZTAC_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ZTAC_MFA_CHALLENGE_TTL_SECONDS: 300
      ZTAC_MFA_MAX_ATTEMPTS: 3
      ZTAC_MFA_DEBUG_MODE: "false"
      ZTAC_CORS_ALLOW_ORIGINS: http://localhost:3000
      ZTAC_CORS_ALLOW_CREDENTIALS: "true"
      ZTAC_TRUSTED_HOSTS: localhost,127.0.0.1
      ZTAC_ENABLE_HTTPS_REDIRECT: "false"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
